<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Horarios</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script type="text/babel">
const { useState, useRef, useMemo, useEffect } = React;

const SCHED_DAYS = ['lu', 'ma', 'mi', 'ju', 'vi'];

function defaultSpan() {
    return { lu: 1, ma: 1, mi: 1, ju: 1, vi: 1 };
}

function ensureSpanRow(row) {
    return { ...row, span: { ...defaultSpan(), ...(row.span || {}) } };
}

function coveredFromAbove(rows, rowIdx, day) {
    const n = rows.length;
    for (let i = 0; i < rowIdx; i++) {
        const sp = ensureSpanRow(rows[i]).span;
        let s = parseInt(sp[day], 10);
        if (Number.isNaN(s) || s < 1) s = 1;
        s = Math.min(s, n - i);
        if (i + s > rowIdx) return true;
    }
    return false;
}

function effSpan(rows, rowIdx, day) {
    const sp = ensureSpanRow(rows[rowIdx]).span;
    let s = parseInt(sp[day], 10);
    if (Number.isNaN(s) || s < 1) s = 1;
    return Math.min(s, rows.length - rowIdx);
}

const DEFAULT_SCHED_COLOR = '#004a99';
const DEFAULT_SCHED_GRID = '#8aa3be';

function hexToRgb(hex) {
    const h = String(hex).replace(/^#/, '').trim();
    const full = h.length === 3 ? h.split('').map((c) => c + c).join('') : h;
    if (!/^[0-9a-f]{6}$/i.test(full)) return null;
    return {
        r: parseInt(full.slice(0, 2), 16),
        g: parseInt(full.slice(2, 4), 16),
        b: parseInt(full.slice(4, 6), 16),
    };
}

function rgbToHex({ r, g, b }) {
    const c = (n) => Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, '0');
    return `#${c(r)}${c(g)}${c(b)}`;
}

function mixHex(a, b, t) {
    const A = hexToRgb(a);
    const B = hexToRgb(b);
    if (!A || !B) return a;
    return rgbToHex({
        r: A.r + (B.r - A.r) * t,
        g: A.g + (B.g - A.g) * t,
        b: A.b + (B.b - A.b) * t,
    });
}

function normalizeHexInput(s) {
    if (!s || typeof s !== 'string') return null;
    let x = s.trim();
    if (!x.startsWith('#')) x = `#${x}`;
    if (/^#[0-9a-f]{6}$/i.test(x)) return x.toLowerCase();
    if (/^#[0-9a-f]{3}$/i.test(x)) {
        const h = x.slice(1);
        return `#${h[0]}${h[0]}${h[1]}${h[1]}${h[2]}${h[2]}`.toLowerCase();
    }
    return null;
}

function rgbaFromRgb(rgb, a) {
    if (!rgb) return `rgba(0, 74, 153, ${a})`;
    return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${a})`;
}

function scheduleDocVars(primaryHex, gridHex) {
    const base = normalizeHexInput(primaryHex) || DEFAULT_SCHED_COLOR;
    const grid = normalizeHexInput(gridHex) || DEFAULT_SCHED_GRID;
    const rgbGrid = hexToRgb(grid);
    return {
        '--sched-primary': base,
        '--sched-dark': mixHex(base, '#000000', 0.32),
        '--sched-light': mixHex(base, '#ffffff', 0.28),
        '--sched-hour-bg': mixHex(base, '#ffffff', 0.9),
        '--sched-hour-text': mixHex(base, '#000000', 0.35),
        '--sched-focus-bg': mixHex(base, '#ffffff', 0.72),
        '--sched-zebra': mixHex(base, '#ffffff', 0.965),
        '--sched-zebra-hover': mixHex(base, '#ffffff', 0.9),
        '--sched-grid': grid,
        '--sched-merge-border': rgbaFromRgb(rgbGrid, 0.4),
        '--sched-footer-border': mixHex(grid, '#ffffff', 0.42),
    };
}

const STORAGE_DRAFT_KEY = 'horario-doc-draft-v1';
const EXPORT_FILE_NAME = 'Horario.json';
const EXPORT_DOC_FORMAT = 'horario-doc-bundle';
const EXPORT_DOC_VERSION = 1;

function getDefaultAppData() {
    return {
        headerText: "PNF ADMINISTRACIÓN\nTRAYECTO II  ·  SECCIÓN 01",
        logoLeft: null,
        logoRight: null,
        logoRightTag: 'Institución',
        scheduleHex: DEFAULT_SCHED_COLOR,
        scheduleGridHex: DEFAULT_SCHED_GRID,
        docenteRows: [
            { id: 1, codigo: "", unidad: "", aula: "", docente: "" },
            { id: 2, codigo: "", unidad: "", aula: "", docente: "" },
            { id: 3, codigo: "", unidad: "", aula: "", docente: "" },
        ],
        horarioRows: [
            { id: 1, hora: "07:30 – 08:15", lu: "", ma: "", mi: "", ju: "", vi: "", span: { ...defaultSpan() } },
            { id: 2, hora: "08:15 – 09:00", lu: "", ma: "", mi: "", ju: "", vi: "", span: { ...defaultSpan() } },
            { id: 3, hora: "09:00 – 09:45", lu: "", ma: "", mi: "", ju: "", vi: "", span: { ...defaultSpan() } },
            { id: 4, hora: "09:45 – 10:30", lu: "", ma: "", mi: "", ju: "", vi: "", span: { ...defaultSpan() } },
            { id: 5, hora: "10:30 – 11:15", lu: "", ma: "", mi: "", ju: "", vi: "", span: { ...defaultSpan() } },
        ],
    };
}

function normalizeDocenteRow(r, i) {
    if (!r || typeof r !== 'object') return { id: i + 1, codigo: '', unidad: '', aula: '', docente: '' };
    return {
        id: typeof r.id === 'number' ? r.id : i + 1,
        codigo: String(r.codigo ?? ''),
        unidad: String(r.unidad ?? ''),
        aula: String(r.aula ?? ''),
        docente: String(r.docente ?? ''),
    };
}

function normalizeHorarioRow(r, i) {
    if (!r || typeof r !== 'object') return null;
    const row = ensureSpanRow({
        id: typeof r.id === 'number' ? r.id : i + 1,
        hora: String(r.hora ?? ''),
        lu: String(r.lu ?? ''),
        ma: String(r.ma ?? ''),
        mi: String(r.mi ?? ''),
        ju: String(r.ju ?? ''),
        vi: String(r.vi ?? ''),
        span: r.span,
    });
    return row;
}

function normalizeAppData(raw) {
    const def = getDefaultAppData();
    if (!raw || typeof raw !== 'object') return def;
    const docenteRows = Array.isArray(raw.docenteRows) && raw.docenteRows.length
        ? raw.docenteRows.map(normalizeDocenteRow)
        : def.docenteRows;
    let horarioRows = Array.isArray(raw.horarioRows) && raw.horarioRows.length
        ? raw.horarioRows.map((r, i) => normalizeHorarioRow(r, i)).filter(Boolean)
        : def.horarioRows;
    const docenteFinal = docenteRows.length ? docenteRows : def.docenteRows;
    if (!horarioRows.length) horarioRows = def.horarioRows;
    return {
        headerText: typeof raw.headerText === 'string' ? raw.headerText : def.headerText,
        logoLeft: typeof raw.logoLeft === 'string' ? raw.logoLeft : null,
        logoRight: typeof raw.logoRight === 'string' ? raw.logoRight : null,
        logoRightTag: typeof raw.logoRightTag === 'string' ? raw.logoRightTag : def.logoRightTag,
        scheduleHex: normalizeHexInput(raw.scheduleHex) || def.scheduleHex,
        scheduleGridHex: normalizeHexInput(raw.scheduleGridHex) || def.scheduleGridHex,
        docenteRows: docenteFinal,
        horarioRows,
    };
}

function loadDraftData() {
    try {
        const raw = localStorage.getItem(STORAGE_DRAFT_KEY);
        if (!raw) return null;
        const o = JSON.parse(raw);
        if (!o || o.v !== 1 || !o.data) return null;
        return normalizeAppData(o.data);
    } catch {
        return null;
    }
}

function parseHorarioDocFile(text) {
    const o = JSON.parse(text);
    if (!o || typeof o !== 'object') throw new Error('INVALID');
    if (o.format === EXPORT_DOC_FORMAT && o.data && typeof o.data === 'object') {
        return normalizeAppData(o.data);
    }
    if (typeof o.headerText === 'string' || Array.isArray(o.docenteRows) || Array.isArray(o.horarioRows)) {
        return normalizeAppData(o);
    }
    throw new Error('INVALID');
}

function buildExportBundle(data) {
    return {
        format: EXPORT_DOC_FORMAT,
        version: EXPORT_DOC_VERSION,
        exportedAt: new Date().toISOString(),
        data: JSON.parse(JSON.stringify(data)),
    };
}

function triggerDownloadExportJson(jsonString) {
    const blob = new Blob([jsonString], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = EXPORT_FILE_NAME;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

async function trySaveExportWithPicker(jsonString) {
    if (typeof window.showSaveFilePicker !== 'function') return false;
    try {
        const handle = await window.showSaveFilePicker({
            suggestedName: EXPORT_FILE_NAME,
            types: [
                {
                    description: 'Documento JSON',
                    accept: { 'application/json': ['.json'] },
                },
            ],
        });
        const writable = await handle.createWritable();
        await writable.write(new Blob([jsonString], { type: 'application/json;charset=utf-8' }));
        await writable.close();
        return true;
    } catch (e) {
        if (e && e.name === 'AbortError') return null;
        console.warn(e);
        return false;
    }
}

const App = () => {
    const initial = useMemo(() => normalizeAppData(loadDraftData() || getDefaultAppData()), []);

    const [headerText, setHeaderText] = useState(initial.headerText);
    const [logoLeft, setLogoLeft] = useState(initial.logoLeft);
    const [logoRight, setLogoRight] = useState(initial.logoRight);
    const [logoRightTag, setLogoRightTag] = useState(initial.logoRightTag);
    const [editHeader, setEditHeader] = useState(false);
    const docRef = useRef(null);
    const importFileRef = useRef(null);
    const [imgBusy, setImgBusy] = useState(false);
    const [aboutOpen, setAboutOpen] = useState(false);
    const [scheduleHex, setScheduleHex] = useState(initial.scheduleHex);
    const [scheduleGridHex, setScheduleGridHex] = useState(initial.scheduleGridHex);

    const docThemeStyle = useMemo(
        () => scheduleDocVars(scheduleHex, scheduleGridHex),
        [scheduleHex, scheduleGridHex],
    );

    const [docenteRows, setDocenteRows] = useState(initial.docenteRows);
    const [horarioRows, setHorarioRows] = useState(initial.horarioRows);

    const draftPayload = useMemo(
        () => ({
            headerText,
            logoLeft,
            logoRight,
            logoRightTag,
            scheduleHex,
            scheduleGridHex,
            docenteRows,
            horarioRows,
        }),
        [headerText, logoLeft, logoRight, logoRightTag, scheduleHex, scheduleGridHex, docenteRows, horarioRows],
    );

    useEffect(() => {
        const t = setTimeout(() => {
            try {
                localStorage.setItem(
                    STORAGE_DRAFT_KEY,
                    JSON.stringify({ v: 1, savedAt: Date.now(), data: draftPayload }),
                );
            } catch (e) {
                console.warn('Borrador: almacenamiento lleno o no disponible', e);
            }
        }, 1400);
        return () => clearTimeout(t);
    }, [draftPayload]);

    const applyAppData = (data) => {
        const d = normalizeAppData(data);
        setHeaderText(d.headerText);
        setLogoLeft(d.logoLeft);
        setLogoRight(d.logoRight);
        setLogoRightTag(d.logoRightTag);
        setScheduleHex(d.scheduleHex);
        setScheduleGridHex(d.scheduleGridHex);
        setDocenteRows(d.docenteRows);
        setHorarioRows(d.horarioRows);
        setEditHeader(false);
    };

    const clearEntireHorario = () => {
        if (!window.confirm('¿Limpiar todo el horario y volver a la plantilla inicial? Se restablecerán encabezado, logos, colores y tablas de docentes y de horas.')) return;
        applyAppData(getDefaultAppData());
    };

    const exportHorarioJson = async () => {
        const bundle = buildExportBundle(draftPayload);
        const jsonString = JSON.stringify(bundle, null, 2);
        try {
            const picked = await trySaveExportWithPicker(jsonString);
            if (picked === true || picked === null) return;
        } catch (e) {
            console.warn(e);
        }
        triggerDownloadExportJson(jsonString);
    };

    const onPickImportFile = () => {
        importFileRef.current?.click();
    };

    const onImportFileChange = (e) => {
        const file = e.target.files && e.target.files[0];
        e.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const data = parseHorarioDocFile(String(reader.result));
                if (!window.confirm('¿Importar este archivo? Se reemplazará el contenido actual del horario.')) return;
                applyAppData(data);
            } catch (err) {
                console.error(err);
                alert('No se pudo leer el archivo. Usa un Horario.json exportado desde esta app o un JSON con los mismos campos del documento.');
            }
        };
        reader.readAsText(file, 'UTF-8');
    };

    const handleLogo = (e, side) => {
        const file = e.target.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onloadend = () => side === 'left' ? setLogoLeft(r.result) : setLogoRight(r.result);
        r.readAsDataURL(file);
    };

    const updDoc = (id, field, value, type) => {
        if (type === 'd') setDocenteRows(rows => rows.map(r => r.id === id ? { ...r, [field]: value } : r));
        else setHorarioRows(rows => rows.map(r => (r.id === id ? ensureSpanRow({ ...r, [field]: value }) : r)));
    };

    const setDaySpan = (rowId, day, spanVal) => {
        setHorarioRows(rows => {
            const idx = rows.findIndex(x => x.id === rowId);
            if (idx === -1) return rows;
            const normalized = rows.map(ensureSpanRow);
            const maxS = normalized.length - idx;
            const s = Math.min(Math.max(parseInt(spanVal, 10) || 1, 1), maxS);
            return normalized.map((r, i) => {
                if (i === idx) return { ...r, span: { ...r.span, [day]: s } };
                if (i > idx && i < idx + s) return { ...r, [day]: '' };
                return r;
            });
        });
    };

    const addRow = type => {
        if (type === 'd') setDocenteRows(r => [...r, { id: Date.now(), codigo: "", unidad: "", aula: "", docente: "" }]);
        else setHorarioRows(r => [...r, { id: Date.now(), hora: "", lu: "", ma: "", mi: "", ju: "", vi: "", span: { ...defaultSpan() } }]);
    };

    const delRow = (id, type) => {
        if (type === 'd') setDocenteRows(r => r.filter(x => x.id !== id));
        else setHorarioRows(rows => {
            const filtered = rows.filter(x => x.id !== id);
            return filtered.map((r, i, arr) => {
                const base = ensureSpanRow(r);
                const sp = { ...base.span };
                SCHED_DAYS.forEach(d => {
                    let s = parseInt(sp[d], 10);
                    if (Number.isNaN(s) || s < 1) s = 1;
                    sp[d] = Math.min(s, arr.length - i);
                });
                return { ...base, span: sp };
            });
        });
    };

    const downloadAsImage = async () => {
        const el = docRef.current;
        if (!el) return;
        if (typeof html2canvas !== 'function') {
            alert('No se pudo cargar la librería para generar la imagen. Comprueba tu conexión.');
            return;
        }
        setImgBusy(true);
        try {
            const canvas = await html2canvas(el, {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                logging: false,
                backgroundColor: '#ffffff',
                onclone: (docClone) => {
                    docClone.querySelectorAll('.no-print').forEach((n) => {
                        n.style.setProperty('display', 'none', 'important');
                    });
                },
            });
            const a = document.createElement('a');
            a.download = `horario-${new Date().toISOString().slice(0, 10)}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
        } catch (err) {
            console.error(err);
            alert('No se pudo generar la imagen.');
        } finally {
            setImgBusy(false);
        }
    };

    const dayLabels = { lu:'Lunes', ma:'Martes', mi:'Miércoles', ju:'Jueves', vi:'Viernes' };

    return (
        <div className="app-shell" style={{padding: '2rem 1rem 6rem'}}>

            {/* ── PANEL ── */}
            <div className="panel no-print">
                <div className="panel-title">
                    Panel de Control — Horarios
                </div>

                <div className="panel-grid">
                    <div>
                        <label className="field-label">Texto del encabezado</label>
                        <textarea className="ctrl"
                            value={headerText}
                            onChange={e => setHeaderText(e.target.value)}
                        />
                    </div>
                    <div>
                        <label className="field-label">Logos</label>
                        <div className="logo-grid">
                            <div>
                                <div style={{fontSize:'0.7rem', color:'var(--muted)', marginBottom:'0.35rem', textAlign:'center'}}>Izquierdo</div>
                                <div className="logo-drop">
                                    {logoLeft ? <img src={logoLeft} alt="Logo izquierdo" /> : (
                                        <>
                                            <span className="logo-placeholder">L</span>
                                            <span className="logo-drop-hint">Clic para subir imagen</span>
                                        </>
                                    )}
                                    <input type="file" accept="image/*" onChange={e => handleLogo(e, 'left')} />
                                </div>
                            </div>
                            <div>
                                <div style={{fontSize:'0.7rem', color:'var(--muted)', marginBottom:'0.35rem', textAlign:'center'}}>Derecho</div>
                                <div className="logo-drop">
                                    {logoRight ? <img src={logoRight} alt="Logo derecho" /> : (
                                        <>
                                            <span className="logo-placeholder">R</span>
                                            <span className="logo-drop-hint">Clic para subir imagen</span>
                                        </>
                                    )}
                                    <input type="file" accept="image/*" onChange={e => handleLogo(e, 'right')} />
                                </div>
                                <label className="field-label" style={{ marginTop: '0.75rem' }}>Texto bajo logo derecho</label>
                                <input
                                    type="text"
                                    className="ctrl logo-tag-input"
                                    value={logoRightTag}
                                    onChange={e => setLogoRightTag(e.target.value)}
                                    maxLength={40}
                                    placeholder="Ej. siglas o nombre corto"
                                />
                            </div>
                        </div>
                    </div>
                </div>

                <div className="panel-stack">
                    <section className="panel-section" aria-labelledby="section-colors-title">
                        <h2 className="panel-section-title" id="section-colors-title">Colores</h2>
                        <div className="panel-colors-grid">
                            <div className="color-field">
                                <label className="field-label" htmlFor="sched-color-hex">Tema del documento</label>
                                <div className="color-picker-row">
                                    <input
                                        id="sched-color-picker"
                                        type="color"
                                        value={normalizeHexInput(scheduleHex) || DEFAULT_SCHED_COLOR}
                                        onChange={(e) => setScheduleHex(e.target.value)}
                                        aria-label="Selector de color del tema"
                                    />
                                    <input
                                        id="sched-color-hex"
                                        type="text"
                                        className="ctrl hex-input"
                                        value={scheduleHex}
                                        onChange={(e) => setScheduleHex(e.target.value)}
                                        onBlur={() => {
                                            const n = normalizeHexInput(scheduleHex);
                                            setScheduleHex(n || DEFAULT_SCHED_COLOR);
                                        }}
                                        placeholder="#004a99"
                                        maxLength={7}
                                        spellCheck={false}
                                        autoComplete="off"
                                        aria-describedby="sched-color-hint"
                                    />
                                </div>
                                <p id="sched-color-hint" className="field-hint">
                                    Hex o selector: cabecera del documento, franja de horas y acentos.
                                </p>
                            </div>
                            <div className="color-field">
                                <label className="field-label" htmlFor="sched-grid-hex">Líneas de tabla</label>
                                <div className="color-picker-row">
                                    <input
                                        id="sched-grid-picker"
                                        type="color"
                                        value={normalizeHexInput(scheduleGridHex) || DEFAULT_SCHED_GRID}
                                        onChange={(e) => setScheduleGridHex(e.target.value)}
                                        aria-label="Selector de color de líneas"
                                    />
                                    <input
                                        id="sched-grid-hex"
                                        type="text"
                                        className="ctrl hex-input"
                                        value={scheduleGridHex}
                                        onChange={(e) => setScheduleGridHex(e.target.value)}
                                        onBlur={() => {
                                            const n = normalizeHexInput(scheduleGridHex);
                                            setScheduleGridHex(n || DEFAULT_SCHED_GRID);
                                        }}
                                        placeholder="#8aa3be"
                                        maxLength={7}
                                        spellCheck={false}
                                        autoComplete="off"
                                        aria-describedby="sched-grid-hint"
                                    />
                                </div>
                                <p id="sched-grid-hint" className="field-hint">
                                    Bordes de celdas, encabezados de columna, barra Combinar y pie.
                                </p>
                            </div>
                        </div>
                    </section>

                    <section className="panel-section" aria-labelledby="section-actions-title">
                        <h2 className="panel-section-title" id="section-actions-title">Tabla y archivos</h2>
                        <div className="panel-actions-grid">
                            <button type="button" className="btn btn-ghost" onClick={() => addRow('d')}>+ Fila docente</button>
                            <button type="button" className="btn btn-ghost" onClick={() => addRow('h')}>+ Fila horario</button>
                            <button type="button" className="btn btn-accent" onClick={() => window.print()}>
                                🖨 Imprimir / PDF
                            </button>
                            <button type="button" className="btn btn-primary" disabled={imgBusy} onClick={downloadAsImage}>
                                {imgBusy ? 'Generando…' : '📷 Descargar PNG'}
                            </button>
                        </div>
                        <p className="field-hint field-hint--tight">Añade filas al documento o expórtalo. El borrador se guarda solo en este navegador.</p>
                    </section>

                    <section className="panel-section" aria-labelledby="section-backup-title">
                        <h2 className="panel-section-title" id="section-backup-title">Respaldo JSON</h2>
                        <p className="field-hint field-hint--tight">
                            Archivo <strong className="backup-strong">Horario.json</strong>: copia de seguridad o para abrir en otro equipo.
                        </p>
                        <div className="panel-backup-buttons">
                            <button type="button" className="btn btn-ghost" onClick={exportHorarioJson}>
                                Exportar
                            </button>
                            <button type="button" className="btn btn-ghost" onClick={onPickImportFile} aria-label="Importar archivo Horario.json">
                                Importar
                            </button>
                            <input
                                ref={importFileRef}
                                type="file"
                                accept=".json,application/json"
                                className="sr-only"
                                tabIndex={-1}
                                aria-hidden="true"
                                onChange={onImportFileChange}
                            />
                            <button type="button" className="btn btn-ghost btn-danger-outline" onClick={clearEntireHorario}>
                                Limpiar todo
                            </button>
                        </div>
                        <p className="field-hint field-hint--small">
                            En Chrome o Edge (HTTPS o localhost), «Exportar» puede abrir «Guardar como» y elegir la carpeta del proyecto. Si no, se descarga el archivo.
                        </p>
                    </section>
                </div>
            </div>

            {/* ── DOCUMENTO ── */}
            <div ref={docRef} className="doc-wrap" style={docThemeStyle}>

                {/* Header */}
                <div className="doc-header">
                    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'2px'}}>
                        <div className="logo-circle">
                            {logoLeft ? <img src={logoLeft} alt="Logo izquierdo" /> : <span className="doc-logo-fallback" aria-hidden="true" />}
                        </div>
                    </div>

                    <div className="header-center" onDoubleClick={() => setEditHeader(true)}>
                        {editHeader
                            ? <textarea
                                autoFocus
                                value={headerText}
                                onChange={e => setHeaderText(e.target.value)}
                                onBlur={() => setEditHeader(false)}
                                rows={3}
                              />
                            : <h2>{headerText}</h2>
                        }
                    </div>

                    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'2px'}}>
                        <div className="logo-square">
                            {logoRight ? <img src={logoRight} alt="Logo derecho" /> : <span className="doc-logo-fallback" aria-hidden="true" />}
                        </div>
                        <div className="logo-tag">{logoRightTag.trim() || '\u00a0'}</div>
                    </div>
                </div>

                {/* Body */}
                <div className="doc-body">
                    <div className="watermark">
                        {logoRight
                            ? <img src={logoRight} />
                            : <span className="watermark-text">{logoRightTag.trim() || 'Horario'}</span>
                        }
                    </div>

                    {/* Docentes */}
                    <div className="gap-section">
                        <div className="section-title">Unidades Curriculares y Docentes</div>
                        <table className="doc-table">
                            <thead>
                                <tr>
                                    <th style={{width:'90px'}}>Código</th>
                                    <th>Unidad Curricular</th>
                                    <th style={{width:'80px'}}>Aula</th>
                                    <th>Docente</th>
                                    <th className="no-print" style={{width:'36px'}}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {docenteRows.map(row => (
                                    <tr key={row.id}>
                                        <td><input value={row.codigo} placeholder="—" onChange={e => updDoc(row.id,'codigo',e.target.value,'d')} /></td>
                                        <td><input value={row.unidad} placeholder="—" onChange={e => updDoc(row.id,'unidad',e.target.value,'d')} /></td>
                                        <td><input value={row.aula}   placeholder="—" onChange={e => updDoc(row.id,'aula',e.target.value,'d')} /></td>
                                        <td><input value={row.docente} placeholder="—" onChange={e => updDoc(row.id,'docente',e.target.value,'d')} /></td>
                                        <td className="no-print" style={{textAlign:'center'}}>
                                            <button className="del-btn" onClick={() => delRow(row.id,'d')}>×</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Horario */}
                    <div className="gap-section">
                        <div className="section-title">Distribución Horaria Semanal</div>
                        <table className="doc-table">
                            <thead>
                                <tr>
                                    <th style={{width:'110px'}}>Hora</th>
                                    {SCHED_DAYS.map(d => <th key={d}>{dayLabels[d]}</th>)}
                                    <th className="no-print" style={{width:'36px'}}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {horarioRows.map((row, rowIdx) => (
                                    <tr key={row.id}>
                                        <td className="hora-cell"><input value={row.hora} onChange={e => updDoc(row.id,'hora',e.target.value,'h')} /></td>
                                        {SCHED_DAYS.flatMap(d => {
                                            if (coveredFromAbove(horarioRows, rowIdx, d)) return [];
                                            const rs = effSpan(horarioRows, rowIdx, d);
                                            const innerTa = Math.max(48, rs * 48);
                                            const stackMin = innerTa + 34;
                                            return [(
                                                <td key={d} {...(rs > 1 ? { rowSpan: rs } : {})} className="ta-merge-cell">
                                                    <div className="schedule-cell-stack" style={{ minHeight: stackMin }}>
                                                        <div className="schedule-cell-text-wrap">
                                                            <textarea
                                                                value={row[d]}
                                                                placeholder=""
                                                                rows={Math.max(1, rs)}
                                                                onChange={e => updDoc(row.id, d, e.target.value, 'h')}
                                                            />
                                                        </div>
                                                        <div className="merge-bar no-print">
                                                            <label htmlFor={`sp-${row.id}-${d}`}>Combinar</label>
                                                            <select
                                                                id={`sp-${row.id}-${d}`}
                                                                value={rs}
                                                                onChange={e => setDaySpan(row.id, d, e.target.value)}
                                                            >
                                                                {Array.from({ length: horarioRows.length - rowIdx }, (_, k) => k + 1).map(n => (
                                                                    <option key={n} value={n}>{n === 1 ? '1 fila' : `${n} filas`}</option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    </div>
                                                </td>
                                            )];
                                        })}
                                        <td className="no-print" style={{textAlign:'center', verticalAlign:'middle'}}>
                                            <button className="del-btn" onClick={() => delRow(row.id,'h')}>×</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div className="doc-footer">
                    Generado el · {new Date().toLocaleDateString('es-VE', {year:'numeric', month:'long', day:'numeric'})}
                </div>
            </div>

            <div className="about-app no-print">
                <button type="button" className="about-trigger" onClick={() => setAboutOpen(o => !o)}>
                    {aboutOpen ? 'Cerrar' : 'Acerca de'}
                </button>
                {aboutOpen && (
                    <p className="about-inline">
                        Desarrollador Raimond Caldera · Codeonyx-Dev ·{' '}
                        <a href="https://github.com/codeonyx-dev" target="_blank" rel="noopener noreferrer">GitHub</a>
                    </p>
                )}
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
